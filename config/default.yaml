strategy:
  target_sharpe: 3.0
  target_ann_return: 0.15
  max_test_drawdown: -0.30
  min_train_days: 252
  min_validation_days: 126
  min_test_days: 126
  train_frac: 0.55
  validation_frac: 0.20
  capital_usd: 100000
  min_basis_entry: 0.08
  exit_basis: 0.025
  max_asset_weight: 0.50
  gross_target: 1.0
  vol_target: 0.12
  vol_window: 42
  hedge_ratio: 1.0
  position_direction: 1
  basis_z_window: 42
  momentum_window: 21
  carry_cost_bps: 175
  futures_roundtrip_bps: 8
  long_leg_roundtrip_bps: 10
  financing_bps: 75
  stale_price_days: 5
  model_selection:
    enabled: true
    min_validation_days: 30
    objective: validation_sharpe
    grid:
      min_basis_entry: [-0.05, 0.00, 0.05]
      exit_basis: [-0.05, 0.00]
      basis_z_entry: [-0.5, 0.5]
      max_asset_weight: [0.50, 1.00]
      gross_target: [1.00, 1.50]
      vol_target: [0.12, 0.25]
      max_pair_vol: [0.50, 1.00]
      hedge_ratio: [0.50, 0.75, 1.00]
      position_direction: [1, -1]
      trend_floor: [-0.15, 0.0]
      use_trend_filter: [false, true]
data:
  accepted_sources:
    - cme_datamine
    - cme_datamine_api
    - databento
    - ibkr_historical
    - cqg
    - rithmic
  blocked_source_terms:
    - synthetic
    - proxy
    - sample
    - demo
    - yfinance
    - yahoo
assets:
  BTC:
    long_symbol: IBIT
    future_roots:
      - BIP
      - MBT
    default_future_root: BIP
    multiplier: 0.01
    cme_micro_multiplier: 0.10
    ibkr_exchange: COINDERIV
    ibkr_local_symbol: BIPZ30
    ibkr_conid: 805366677
    min_tick: 5.0
  ETH:
    long_symbol: ETHA
    future_roots:
      - ETP
      - MET
    default_future_root: ETP
    multiplier: 0.10
    cme_micro_multiplier: 0.10
    ibkr_exchange: COINDERIV
    ibkr_local_symbol: ETPZ30
    ibkr_conid: 805366682
    min_tick: 0.50
execution:
  require_paper_trading: true
  allow_live_trading: false
  allow_market_orders: false
  max_futures_contracts_per_run: 1
  futures_order_type: LIMIT
  long_leg_order_type: LIMIT
  limit_offset_ticks: 2
  long_leg_limit_offset_bps: 5
  order_wait_seconds: 45
  cancel_unfilled: true
