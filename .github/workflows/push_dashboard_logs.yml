name: Push dashboard logs

on:
  workflow_dispatch:
    inputs:
      source_run_id:
        description: "Optional IBKR Paper Rebalance run ID. Empty uses the latest completed run with a logs artifact."
        required: false
        default: ""
  workflow_run:
    workflows: ["IBKR Paper Rebalance"]
    types: [completed]

permissions:
  actions: read
  contents: write

concurrency:
  group: push-dashboard-logs-real-crypto-carry
  cancel-in-progress: false

jobs:
  push-logs:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download logs artifact
        env:
          EVENT_RUN_ID: ${{ github.event.workflow_run.id }}
          INPUT_RUN_ID: ${{ inputs.source_run_id }}
        run: |
          set -euo pipefail
          RUN_ID="${EVENT_RUN_ID:-$INPUT_RUN_ID}"
          if [ -z "$RUN_ID" ]; then
            RUN_ID="$(gh run list --workflow "IBKR Paper Rebalance" --status completed --limit 10 --json databaseId,conclusion -q '.[] | select(.conclusion=="success" or .conclusion=="failure") | .databaseId' | head -n 1)"
          fi
          if [ -z "$RUN_ID" ]; then
            echo "No source run ID found."
            exit 1
          fi

          echo "Downloading logs artifact from run ${RUN_ID}"
          rm -rf .downloaded-logs
          mkdir -p .downloaded-logs
          if ! gh run download "$RUN_ID" --name ibkr-dashboard-logs --dir .downloaded-logs; then
            if [ -n "$EVENT_RUN_ID" ] && [ -z "$INPUT_RUN_ID" ]; then
              echo "::warning::No dashboard logs artifact found for automatic source run ${RUN_ID}; nothing to push."
              exit 0
            fi
            exit 1
          fi

          mkdir -p logs
          if [ -d .downloaded-logs/logs ]; then
            rsync -a .downloaded-logs/logs/ logs/
          else
            rsync -a .downloaded-logs/ logs/
          fi

      - name: Commit and push logs
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f logs/

          if git diff --cached --quiet; then
            echo "No dashboard log changes to commit."
            exit 0
          fi

          git commit -m "Update IBKR dashboard logs [skip ci]"

          for attempt in 1 2 3 4 5; do
            echo "Pushing dashboard logs, attempt ${attempt}/5..."
            if git fetch origin main && git rebase origin/main && git push origin HEAD:main; then
              echo "Dashboard logs pushed."
              exit 0
            fi
            git rebase --abort || true
            sleep $((attempt * 10))
          done

          echo "Failed to push dashboard logs after retries."
          exit 1
