name: IBKR Paper Rebalance

permissions:
  actions: read
  contents: write

on:
  workflow_dispatch:
    inputs:
      submit_orders:
        description: Submit paper orders after the dry run
        required: true
        type: choice
        options:
          - "true"
          - "false"
        default: "true"
  schedule:
    # GitHub schedules are UTC. These two entries cover 9:30 AM New York
    # during daylight saving and standard time; a guard step below skips
    # whichever one is not currently the 9 AM New York hour.
    - cron: "30 13 * * 1-5"
    - cron: "30 14 * * 1-5"

concurrency:
  group: ibkr-paper-rebalance
  cancel-in-progress: true

jobs:
  runner-preflight:
    name: Verify IBKR runner availability
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Check for online ibkr-paper runner
        timeout-minutes: 2
        env:
          GH_TOKEN: ${{ secrets.RUNNER_ADMIN_TOKEN || github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          body="$(mktemp)"
          code="$(curl -sS -L -o "$body" -w "%{http_code}" \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${REPO}/actions/runners?per_page=100" || true)"

          if [ "$code" != "200" ]; then
            echo "::warning::Could not verify self-hosted runners via API (HTTP $code). If the rebalance job queues, start/configure the local macOS repo runner or add a RUNNER_ADMIN_TOKEN secret with repository Administration read access."
            exit 0
          fi

          python - "$body" <<'PY'
          import json
          import sys

          data = json.load(open(sys.argv[1], encoding="utf-8"))
          matches = []
          for runner in data.get("runners", []):
              labels = {label.get("name") for label in runner.get("labels", [])}
              has_ibkr_label = {"self-hosted", "ibkr-paper"}.issubset(labels)
              has_default_mac_label = {"self-hosted", "macOS", "X64"}.issubset(labels)
              if runner.get("status") == "online" and (has_ibkr_label or has_default_mac_label):
                  matches.append(runner.get("name") or str(runner.get("id")))

          if not matches:
              print("::error::No online repository macOS self-hosted runner found. Configure and start the Mac runner before triggering this workflow.")
              raise SystemExit(1)

          print("Found online Mac runner(s): " + ", ".join(matches))
          PY

  rebalance:
    name: Pull data, build artifact, submit paper rebalance
    needs: runner-preflight
    runs-on: [self-hosted, macOS, X64]
    timeout-minutes: 25
    env:
      IBKR_ACCOUNT: ${{ secrets.IBKR_ACCOUNT }}
      IBKR_HOST: ${{ vars.IBKR_HOST || '127.0.0.1' }}
      IBKR_PORT: ${{ vars.IBKR_PORT || '7497' }}
      IBKR_CLIENT_ID: ${{ vars.IBKR_CLIENT_ID || '17' }}
      IBKR_HISTORY_CLIENT_ID: ${{ vars.IBKR_HISTORY_CLIENT_ID || '92' }}
      IBKR_TIMEOUT: ${{ vars.IBKR_TIMEOUT || '15' }}
      IBKR_REQUIRE_PAPER_TRADING: "true"
      IBKR_ALLOW_LIVE_TRADING: "false"
      IBKR_ALLOW_MARKET_ORDERS: "true"
      IBKR_SUBMIT_ORDERS: ${{ github.event.inputs.submit_orders || 'true' }}
      IBKR_LONG_LEG_ORDER_TYPE: ${{ vars.IBKR_LONG_LEG_ORDER_TYPE || 'MKT' }}
      IBKR_LONG_LEG_LIMIT_OFFSET_BPS: ${{ vars.IBKR_LONG_LEG_LIMIT_OFFSET_BPS || '5' }}
      IBKR_ORDER_WAIT_SECONDS: ${{ vars.IBKR_ORDER_WAIT_SECONDS || '45' }}
      IBKR_CANCEL_UNFILLED: ${{ vars.IBKR_CANCEL_UNFILLED || 'true' }}

    steps:
      - name: Check out repo
        uses: actions/checkout@v4
        with:
          clean: false

      - name: Install package
        timeout-minutes: 8
        run: |
          python3 -m venv .venv
          .venv/bin/python -m pip install --upgrade pip
          .venv/bin/python -m pip install -e . pytest

      - name: Enforce paper-only account and port
        timeout-minutes: 1
        run: |
          .venv/bin/python - <<'PY'
          import os
          account = os.environ.get("IBKR_ACCOUNT", "").strip()
          port = int(os.environ.get("IBKR_PORT", "7497"))
          if not account:
              raise SystemExit("IBKR_ACCOUNT secret is required.")
          if not account.upper().startswith("DU"):
              raise SystemExit("IBKR_ACCOUNT must be a paper account id starting with DU.")
          if port not in {7497, 4002}:
              raise SystemExit("Paper rebalance workflow only allows TWS 7497 or IB Gateway 4002.")
          print(f"Paper safety checks passed on port {port}.")
          PY

      - name: Decide whether this run should rebalance
        id: time_guard
        timeout-minutes: 1
        run: |
          .venv/bin/python - <<'PY'
          import os
          from datetime import datetime
          from zoneinfo import ZoneInfo

          event_name = os.environ.get("GITHUB_EVENT_NAME", "")
          should_run = True
          reason = "manual run"
          if event_name == "schedule":
              now = datetime.now(ZoneInfo("America/New_York"))
              should_run = now.weekday() < 5 and now.hour == 9
              reason = f"New York time is {now:%Y-%m-%d %H:%M:%S %Z}"
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
              fh.write(f"run_rebalance={str(should_run).lower()}\n")
          print(f"run_rebalance={should_run}; {reason}")
          PY

      - name: Preflight IBKR paper connection
        if: steps.time_guard.outputs.run_rebalance == 'true'
        timeout-minutes: 2
        run: .venv/bin/python scripts/preflight_ibkr_paper.py

      - name: Pull latest IBKR historical data
        if: steps.time_guard.outputs.run_rebalance == 'true'
        timeout-minutes: 10
        run: .venv/bin/python scripts/pull_ibkr_history.py

      - name: Build deployable artifact
        if: steps.time_guard.outputs.run_rebalance == 'true'
        timeout-minutes: 5
        run: |
          .venv/bin/python scripts/build_artifact.py \
            --curve-csv data/cme_curve.csv \
            --long-prices-csv data/long_prices.csv \
            --out-dir artifacts/latest \
            --data-source ibkr_historical

      - name: Show status and plan
        if: steps.time_guard.outputs.run_rebalance == 'true'
        timeout-minutes: 1
        run: |
          .venv/bin/python - <<'PY'
          import json
          from pathlib import Path
          status = json.loads(Path("artifacts/latest/status.json").read_text())
          plan = json.loads(Path("artifacts/latest/execution_plan_latest.json").read_text())
          print(json.dumps(status, indent=2))
          print(json.dumps(plan, indent=2))
          PY

      - name: Dry run rebalance
        if: steps.time_guard.outputs.run_rebalance == 'true'
        timeout-minutes: 3
        run: .venv/bin/python scripts/run_ibkr_rebalance.py --artifact-dir artifacts/latest --dry-run

      - name: Submit paper rebalance
        if: steps.time_guard.outputs.run_rebalance == 'true' && env.IBKR_SUBMIT_ORDERS == 'true'
        timeout-minutes: 5
        run: .venv/bin/python scripts/run_ibkr_rebalance.py --artifact-dir artifacts/latest

      - name: Commit dashboard logs
        if: steps.time_guard.outputs.run_rebalance == 'true'
        timeout-minutes: 3
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          files=()
          for file in \
            logs/portfolio/portfolio.csv \
            logs/decisions/latest_decision.csv \
            logs/decisions/decisions.csv \
            logs/health/health_status.json
          do
            if [ -f "$file" ]; then
              files+=("$file")
            fi
          done
          if [ ${#files[@]} -eq 0 ]; then
            echo "No dashboard log files were produced."
            exit 0
          fi
          git add -f "${files[@]}"
          if git diff --cached --quiet; then
            echo "No dashboard log changes to commit."
          else
            git commit -m "Update IBKR dashboard logs [skip ci]"
            git pull --rebase --autostash origin main
            git push
          fi

      - name: Upload artifact bundle
        if: always() && steps.time_guard.outputs.run_rebalance == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ibkr-paper-rebalance-artifacts
          path: |
            artifacts/latest/artifacts.zip
            artifacts/latest/status.json
            artifacts/latest/execution_plan_latest.json
            artifacts/latest/performance_summary.csv
